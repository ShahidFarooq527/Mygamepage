<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wingo Admin Panel</title>
<style>
body { font-family: Arial; background:#eef3ff; text-align:center; margin:0; padding:0; }
.container { max-width:900px; margin:auto; padding:20px; }
h2 { color:#0d47a1; font-size:32px;}
input, button, select { padding:8px 12px; margin:5px; border-radius:6px; font-size:14px; }
button { cursor:pointer; transition:0.3s; }
button:hover{ transform:scale(1.05); }
.tableContainer { max-height:400px; overflow-y:auto; border:1px solid #ccc; margin-top:15px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th, td { border:1px solid #ddd; padding:6px; text-align:center; }
th { background:#1976d2; color:white; position:sticky; top:0; z-index:2; }
</style>
</head>
<body>

<div class="container" id="loginDiv">
<h2>Admin Login</h2>
<input type="text" id="adminUser" placeholder="Username"><br>
<input type="password" id="adminPass" placeholder="Password"><br>
<button onclick="loginAdmin()">Login</button>
</div>

<div class="container" id="adminDiv" style="display:none;">
<h2>Admin Panel</h2>
<h3>Pending Deposit & Withdraw Requests</h3>
<div class="tableContainer">
<table id="requestsTable">
<tr><th>User ID</th><th>Name</th><th>Method</th><th>Account</th><th>Transaction</th><th>Type</th><th>Amount</th><th>Date</th><th>Status</th><th>Reason</th><th>Action</th></tr>
</table>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyA5CeMKIv2ss5O2ha7TuWEZUM9rL3mA1CY",
  authDomain: "singo-274c9.firebaseapp.com",
  databaseURL: "https://singo-274c9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "singo-274c9",
  storageBucket: "singo-274c9.appspot.com",
  messagingSenderId: "350557755356",
  appId: "1:350557755356:web:49bab09aee8aa53d84a119"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== Admin Login =====
const ADMIN_USERNAME = "Admin"; // set your admin username
const ADMIN_PASSWORD = "1234"; // set your admin password

function loginAdmin(){
    const user = document.getElementById("adminUser").value;
    const pass = document.getElementById("adminPass").value;

    if(user===ADMIN_USERNAME && pass===ADMIN_PASSWORD){
        alert("✅ Login Successful!");
        document.getElementById("loginDiv").style.display="none";
        document.getElementById("adminDiv").style.display="block";
        loadRequests();
    } else {
        alert("❌ Wrong username or password!");
    }
}

// ===== Load Requests =====
function loadRequests(){
    const t = document.getElementById("requestsTable");
    t.innerHTML="<tr><th>User ID</th><th>Name</th><th>Method</th><th>Account</th><th>Transaction</th><th>Type</th><th>Amount</th><th>Date</th><th>Status</th><th>Reason</th><th>Action</th></tr>";

    db.ref('requests').on('value', snap=>{
        t.innerHTML="<tr><th>User ID</th><th>Name</th><th>Method</th><th>Account</th><th>Transaction</th><th>Type</th><th>Amount</th><th>Date</th><th>Status</th><th>Reason</th><th>Action</th></tr>";
        snap.forEach(s=>{
            const r = s.val();
            const key = s.key;
            const status = r.status || "pending";
            const reason = r.reason || "";

            let actionBtns = "";
            if(status==="pending"){
                actionBtns = `<button onclick="approve('${key}')">Approve</button> 
                              <button onclick="reject('${key}')">Reject</button>`;
            }

            t.innerHTML += `<tr>
                <td>${r.user}</td>
                <td>${r.name}</td>
                <td>${r.method}</td>
                <td>${r.account}</td>
                <td>${r.trx||''}</td>
                <td>${r.type}</td>
                <td>${r.amount}</td>
                <td>${r.date}</td>
                <td>${status}</td>
                <td>${reason}</td>
                <td>${actionBtns}</td>
            </tr>`;
        });
    });
}

// ===== Approve / Reject =====
function approve(key){
    db.ref('requests/'+key).once('value').then(s=>{
        const r = s.val();
        if(!r) return;

        // ===== Update Request Status =====
        db.ref('requests/'+key).update({status:'approved', reason:'NO REASON'});

        // ===== Update User Balance & Daily History =====
        db.ref('users/'+r.user).once('value').then(uSnap=>{
            const userData = uSnap.val() || {};
            let newBalance = userData.balance || 0;
            if(r.type==='deposit'){
                newBalance += r.amount;
            }
            db.ref('users/'+r.user+'/balance').set(newBalance);

            // Push to dailyHistory
            const historyEntry = {
                date: r.date,
                deposit: r.type==='deposit'? r.amount : 0,
                withdraw: r.type==='withdraw'? r.amount : 0,
                status: 'approved',
                reason: 'Approved by admin'
            };
            db.ref('users/'+r.user+'/dailyHistory').push(historyEntry);
        });

        alert("✅ Request Approved!");
    });
}

function reject(key){
    const reason = prompt("Enter reason for rejection");
    if(!reason) return alert("Reason required!");

    db.ref('requests/'+key).once('value').then(s=>{
        const r = s.val();
        if(!r) return;

        db.ref('requests/'+key).update({status:'rejected', reason:reason});

        // Update dailyHistory for user
        db.ref('users/'+r.user).once('value').then(uSnap=>{
            const userData = uSnap.val() || {};
            const historyEntry = {
                date: r.date,
                deposit: r.type==='deposit'? r.amount : 0,
                withdraw: r.type==='withdraw'? r.amount : 0,
                status: 'rejected',
                reason: reason
            };
            db.ref('users/'+r.user+'/dailyHistory').push(historyEntry);
        });

        alert("❌ Request Rejected!");
    });
}
</script>
</body>
</html>
